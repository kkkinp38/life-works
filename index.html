<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life-Works">
<meta name="theme-color" content="#0f1219">
<title>Life-Works</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  background:linear-gradient(145deg,#0a0e1a 0%,#111827 60%,#0d1520 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 20px;
  padding-top:calc(env(safe-area-inset-top,0px) + 40px);
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 40px);
}
.logo{
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
  margin-bottom:8px;
}
.title{
  font-size:28px;
  font-weight:800;
  color:#f1f5f9;
  margin-bottom:6px;
  letter-spacing:-0.5px;
}
.sub{
  font-size:13px;
  color:rgba(148,163,184,0.7);
  margin-bottom:48px;
}
.btn{
  display:flex;
  align-items:center;
  gap:16px;
  width:100%;
  max-width:360px;
  padding:22px 20px;
  border-radius:20px;
  text-decoration:none;
  margin-bottom:14px;
  transition:transform 0.15s,box-shadow 0.15s;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(0.97)}
.btn-sim{
  background:linear-gradient(135deg,#1e3a5f 0%,#1a2f4e 100%);
  border:1.5px solid rgba(79,142,247,0.3);
  box-shadow:0 8px 32px rgba(79,142,247,0.15);
}
.btn-mgr{
  background:linear-gradient(135deg,#1a2f3a 0%,#162535 100%);
  border:1.5px solid rgba(34,197,94,0.3);
  box-shadow:0 8px 32px rgba(34,197,94,0.12);
}
.btn-icon{
  font-size:36px;
  flex-shrink:0;
}
.btn-body{
  flex:1;
}
.btn-label{
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:4px;
}
.btn-sim .btn-label{color:rgba(79,142,247,0.8)}
.btn-mgr .btn-label{color:rgba(34,197,94,0.8)}
.btn-name{
  font-size:17px;
  font-weight:700;
  color:#f1f5f9;
  line-height:1.2;
}
.btn-desc{
  font-size:11px;
  color:rgba(148,163,184,0.6);
  margin-top:3px;
}
.arrow{
  font-size:18px;
  color:rgba(255,255,255,0.2);
  flex-shrink:0;
}
.footer{
  margin-top:40px;
  font-size:11px;
  color:rgba(148,163,184,0.3);
  text-align:center;
  line-height:1.8;
}
</style>
</head>
<body>

<div class="logo">Life-Works</div>
<div class="title">おかケイ 大家ツール</div>
<div class="sub">物件管理・投資判断</div>

<a class="btn btn-sim" href="https://delicate-faun-d95034.netlify.app" target="_blank" rel="noopener">
  <div class="btn-icon">🏚️</div>
  <div class="btn-body">
    <div class="btn-label">シミュレーター</div>
    <div class="btn-name">購入判断シミュレーター</div>
    <div class="btn-desc">内覧チェック → リフォーム見積 → 利回り計算</div>
  </div>
  <div class="arrow">›</div>
</a>

<a class="btn btn-mgr" href="./%E5%85%A5%E5%B1%85%E8%80%85%E3%83%BB%E5%AE%9A%E6%9C%9F%E5%80%9F%E5%AE%B6%20%E5%A5%91%E7%B4%84%E7%AE%A1%E7%90%86.html">
  <div class="btn-icon">🏠</div>
  <div class="btn-body">
    <div class="btn-label">契約管理</div>
    <div class="btn-name">入居者・定期借家管理</div>
    <div class="btn-desc">契約期限・火災保険・収入管理</div>
  </div>
  <div class="arrow">›</div>
</a>

<div class="footer">
  kkkinp38.github.io/life-works<br>
  データはこのデバイスのみに保存されます
</div>

</body>
</html>
